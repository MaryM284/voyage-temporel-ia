<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Où voyageriez-vous ? - IA Temporal</title>
    <style>
        /* --- STYLE GLOBAL & FOND --- */
        body {
            background-color: #010409;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- LE CONTENEUR PRINCIPAL (BLOC BLEU NUIT) --- */
        .interface-container {
            background: linear-gradient(145deg, #020617, #030712);
            border: 2px solid #00d2ff;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            padding: 30px;
            width: 900px;
            max-width: 95%;
        }

        .interface-title {
            text-align: center;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #f8fafc;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* --- GRILLE À 3 COLONNES --- */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr;
            gap: 25px;
        }

        .column-title {
            text-align: center;
            font-size: 14px;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .column-subtitle {
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 15px;
        }

        /* --- BOUTONS ÉTAPES 1 & 2 --- */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .step-btn {
            background: linear-gradient(180deg, #0b1528, #050b14);
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #94a3b8;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        /* Effet au survol (Hover) */
        .step-btn:hover {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
            color: #fff;
        }

        /* État Sélectionné / Actif (Reflet Doré comme sur l'image) */
        .step-btn.active {
            border-color: #fbbf24;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4), inset 0 0 10px rgba(251, 191, 36, 0.1);
            color: #fbbf24;
        }

        /* --- ENCADRÉ RÉSULTAT IA (À DROITE) --- */
        .result-box {
            border: 2px solid #fbbf24;
            border-radius: 8px;
            padding: 20px;
            background: rgba(2, 6, 23, 0.8);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .result-header {
            text-align: center;
            font-weight: bold;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .ia-status-container {
            background: rgba(5, 11, 20, 0.6);
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .status-line {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #e2e8f0;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Voyant lumineux clignotant */
        .indicator-light {
            width: 12px;
            height: 12px;
            background-color: #f59e0b;
            border-radius: 3px;
            box-shadow: 0 0 8px #f59e0b;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; box-shadow: 0 0 2px #f59e0b; }
            to { opacity: 1; box-shadow: 0 0 12px #f59e0b; }
        }

        .ia-text {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
        }

        /* --- BOUTON D'ACTION PRINCIPAL --- */
        .action-btn {
            background: linear-gradient(180deg, #fbbf24, #d97706);
            border: none;
            border-radius: 6px;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            padding: 15px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(251, 191, 36, 0.5);
        }
    </style>
</head>
<body>

    <div class="interface-container">
        <div class="interface-title">Où voyageriez-vous ?</div>
        
        <div class="grid-layout">
            <!-- COLONNE ÉTAPE 1 -->
            <div>
                <div class="column-title">Étape 1</div>
                <div class="column-subtitle">Type d'aventure</div>
                <div class="btn-list">
                    <div class="step-btn"><span>🎨 Art</span></div>
                    <div class="step-btn active"><span>🏔️ Nature</span></div> <!-- Actif -->
                    <div class="step-btn"><span>🧭 Action</span></div>
                </div>
            </div>

            <!-- COLONNE ÉTAPE 2 -->
            <div>
                <div class="column-title">Étape 2</div>
                <div class="column-subtitle">Activité favorite</div>
                <div class="btn-list">
                    <div class="step-btn active"><span>🔭 Explorer</span></div> <!-- Actif -->
                    <div class="step-btn"><span>🏹 Chasser</span></div>
                    <div class="step-btn"><span>🪶 Créer</span></div>
                </div>
            </div>

            <!-- ENCADRÉ RÉSULTAT IA -->
            <div class="result-box">
                <div>
                    <div class="result-header">Résultat IA</div>
                    <div class="ia-status-container">
                        <div class="status-line">
                            <div class="indicator-light"></div>
                            <span>IA ACTIVE</span>
                        </div>
                        <div class="ia-text">
                            Analyse de vos préférences temporelles effectuée.<br><br>
                            <strong>Destination idéale :</strong><br>
                            Ère Jurassique — Observation de la faune primitive.
                        </div>
                    </div>
                </div>
                
                <button class="action-btn">Réserver cette époque</button>
            </div>
        </div>
    </div>

</body>
</html>
